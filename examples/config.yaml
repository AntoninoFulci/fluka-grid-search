fluka:
  input: simulation.inp  # place your FLUKA .inp file next to this config
  custom_executable: null
  rfluka_path: null
  primaries: 10000
  use_dpm: false  # set true to use flukadpm (DPMJET/RQMD); mutually exclusive with custom_executable

output:
  directory: results/

grid:
  parameters:
    beame: [0.05, 0.1, 0.5]
    mat: [GALLIUM, TUNGSTEN]
  runs_per_combo: 5

execution:
  max_parallel: 4

postprocessing:
  ".21":
    executable: usbsuw
  ".22":
    executable: usbrea
