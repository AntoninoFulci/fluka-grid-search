fluka:
  input: simulation.inp  # place your FLUKA .inp file next to this config
  custom_executable: null
  rfluka_path: null
  primaries: 10000
  # use_dpm: not supported — submission is delegated to FlukaQueueSub

output:
  directory: results/

grid:
  parameters:
    beame: [0.05, 0.1, 0.5]
    mat: [GALLIUM, TUNGSTEN]
  runs_per_combo: 5

execution:
  backend: ts        # ts (default) | slurm | lsf | condor
  max_parallel: 4    # ts slot count (local concurrency)
